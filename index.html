<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>om sakthi bikes  </title>
    <style>
        :root {
            --primary: #2c3747;
            --accent: #ff9900;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            /* This constrains the view to a mobile "canvas" on desktop while being full-width on mobile */
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            padding-bottom: 70px; /* Space for bottom nav */
        }

        /* --- Header & Search --- */
        .header {
            background: var(--primary);
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
            color: white;
        }

        .brand { font-size: 20px; font-weight: 800; text-align: center; margin-bottom: 10px; }
        .brand span { color: var(--accent); }

        .search-container {
            display: flex;
            background: white;
            border-radius: 25px;
            padding: 5px 15px;
            align-items: center;
        }

        .search-container input {
            border: none;
            flex: 1;
            padding: 8px;
            outline: none;
            font-size: 14px;
        }
   
        /* --- Admin Panel --- */
        #admin-panel {
            display: none;
            background: white;
            margin: 15px;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid var(--accent);
        }

        .input-group { margin-bottom: 12px; }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn-post {
            background: var(--accent);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- Content Feed --- */
        .feed { padding: 10px; }
        
        .whatsapp-banner {
            background: #25D366;
            color: white;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .post-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            margin-bottom : 20px;
            box-shadow: 0 2px 8px rgba(255, 0, 0, 0.08);
            position: relative;
        }

        .post-card img {
            width: 100%;
            height: 600px;
            object-fit: cover;
        }

        .post-info { padding: 15px; }
        .post-title { font-size: 18px; font-weight: bold; color: #333; }
        .post-desc { color: #666; font-size: 14px; margin: 5px 0; }
        
        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,0,0,0.8);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
        }

        /* --- Bottom Navigation --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 480px;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #ddd;
        }

        .nav-item {
            text-align: center;
            font-size: 12px;
            color: #666;
            text-decoration: none;
            cursor: pointer;
        }

        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 20px; display: block; }

    </style>
</head>
<body>

    <div class="header">
        <div class="brand">OM SAKTHI <span>BIKES</span></div>
        <div class="search-container">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="Search bikes (Yamaha, Honda...)" onkeyup="searchPosts()">
        </div>
    </div>

    <div class="feed">
        <div class="whatsapp-banner">
            DM FOR SERVICE: 8807484121
        </div>

        <div id="admin-panel">
            <h3 style="margin-top:0">Add New Bike</h3>
            <div class="input-group"><input type="file" id="imgInput" accept="image/*"></div>
            <div class="input-group"><input type="text" id="bikeName" placeholder="Bike Name"></div>
            <div class="input-group"><input type="text" id="bikeDesc" placeholder="Brief Description"></div>
            <button class="btn-post" onclick="publish()">PUBLISH NOW</button>
        </div>

        <div id="postGrid">
            </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="location.reload()">
            <span class="nav-icon">🏠</span>Home
        </div>
        <div class="nav-item" onclick="promptAdmin()">
            <span class="nav-icon">🔑</span>Admin
        </div>
        <a href="https://wa.me/918807484121" class="nav-item" style="color: inherit; text-decoration: none;">
            <span class="nav-icon">💬</span>Contact
        </a>
    </nav>

    <script>
        let posts = JSON.parse(localStorage.getItem('omSakthiData')) || [];
        let isAdmin = false;

        window.onload = loadPosts;

        function promptAdmin() {
            let key = prompt("Enter Admin Key:");
            if(key === "2121") {
                isAdmin = true;
                document.getElementById('admin-panel').style.display = "block";
                loadPosts();
                alert("Admin Mode Active");
            } else {
                alert("Access Denied");
            }
        }

        function publish() {
            const fileInput = document.getElementById('imgInput');
            const nameInput = document.getElementById('bikeName');
            const descInput = document.getElementById('bikeDesc');

            if(!fileInput.files[0] || !nameInput.value) return alert("Photo & Name required!");

            const reader = new FileReader();
            reader.readAsDataURL(fileInput.files[0]);
            reader.onload = function(e) {
                const newPost = {
                    id: Date.now(),
                    img: e.target.result,
                    title: nameInput.value,
                    desc: descInput.value || "Premium Service"
                };
                posts.unshift(newPost);
                localStorage.setItem('omSakthiData', JSON.stringify(posts));
                loadPosts();
                
                // Clear inputs
                nameInput.value = "";
                descInput.value = "";
                fileInput.value = "";
            };
        }

        function loadPosts() {
            const grid = document.getElementById('postGrid');
            grid.innerHTML = "";
            posts.forEach(p => {
                grid.innerHTML += `
                    <div class="post-card">
                        ${isAdmin ? `<button class="delete-btn" onclick="del(${p.id})">Delete</button>` : ''}
                        <img src="${p.img}">
                        <div class="post-info">
                            <div class="post-title">${p.title}</div>
                            <div class="post-desc">${p.desc}</div>
                            <div style="color:#ffc107">⭐⭐⭐⭐⭐</div>
                        </div>
                    </div>
                `;
            });
        }

        function del(id) {
            if(confirm("Delete this post?")) {
                posts = posts.filter(p => p.id !== id);
                localStorage.setItem('omSakthiData', JSON.stringify(posts));
                loadPosts();
            }
        }

        function searchPosts() {
            let filter = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('post-card');
            for (let card of cards) {
                let text = card.innerText.toLowerCase();
                card.style.display = text.includes(filter) ? "" : "none";
            }
        }
    </script>
</body>
